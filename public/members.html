<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Directory | Premium Dashboard</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Inter:wght@400;500;700&display=swap"
        rel="stylesheet">
    <!-- Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --accent-orange: #fb923c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image:
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0, transparent 50%),
                radial-gradient(at 100% 100%, rgba(251, 146, 60, 0.1) 0, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            animation: fadeIn 0.8s ease-out;
        }

        header {
            margin-bottom: 3rem;
            text-align: center;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 600;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Glassmorphism Card */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            gap: 1rem;
        }

        .search-box {
            position: relative;
            flex-grow: 1;
        }

        .search-box input {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 20px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        .refresh-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .refresh-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        /* Table Styling */
        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            padding: 1.25rem 1rem;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 1.25rem 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
        }

        tr {
            transition: background 0.2s ease;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .user-name {
            font-weight: 600;
            color: white;
        }

        .user-email {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .tag {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        /* Loading State */
        #loader {
            display: none;
            text-align: center;
            padding: 3rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>데이터 대시보드</h1>
            <p class="subtitle">Supabase 실시간 동기화 멤버 리스트</p>
        </header>

        <div class="card">
            <div class="controls">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="이름, 이메일 또는 연락처로 검색...">
                </div>
                <button class="refresh-btn" onclick="fetchData()">
                    <span>새로고침</span>
                </button>
            </div>

            <div id="loader">
                <div class="spinner"></div>
                <p>데이터를 불러오는 중입니다...</p>
            </div>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>회원 정보</th>
                            <th>연락처</th>
                            <th>가입일</th>
                            <th>상태</th>
                        </tr>
                    </thead>
                    <tbody id="memberTableBody">
                        <!-- Data will be injected here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Supabase Configuration
        const SUPABASE_URL = 'https://fmjraryzqjtithiljkez.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_vgh26GyS_To0CYC7ZuIwsg_7FMhCtgU';

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchData() {
            const loader = document.getElementById('loader');
            const tbody = document.getElementById('memberTableBody');

            loader.style.display = 'block';
            tbody.innerHTML = '';

            try {
                const { data, error } = await supabaseClient
                    .from('members')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                renderTable(data);
            } catch (err) {
                console.error('Error fetching data:', err);
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color: #ef4444; padding: 2rem;">데이터를 불러오는 중 오류가 발생했습니다.</td></tr>`;
            } finally {
                loader.style.display = 'none';
            }
        }

        function renderTable(members) {
            const tbody = document.getElementById('memberTableBody');
            tbody.innerHTML = '';

            members.forEach((member, index) => {
                const date = new Date(member.created_at).toLocaleDateString();
                const tr = document.createElement('tr');
                tr.style.animation = `fadeIn 0.5s ease-out ${index * 0.05}s both`;

                tr.innerHTML = `
                    <td>
                        <div class="user-name">${member.full_name || '이름 없음'}</div>
                        <div class="user-email">${member.email}</div>
                    </td>
                    <td>${member.phone || '-'}</td>
                    <td>${date}</td>
                    <td><span class="tag">Active</span></td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Search Functionality
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const rows = document.querySelectorAll('#memberTableBody tr');

            rows.forEach(row => {
                const text = row.innerText.toLowerCase();
                row.style.display = text.includes(term) ? '' : 'none';
            });
        });

        // Initialize
        fetchData();
    </script>
</body>

</html>
